# ============================== Mihomo Full Config ==============================
# ================================================================================
# @Author      : Law Chain
# @Project     : Mihomo Full Config
# @Update      : 2026-03-11
# @Description : 本配置模板基于 mihomo 官方配置，参考 Mitchell 规则实现了完整配置。
#                包含：精细化分流(AI/流媒体/游戏)、防 DNS 泄露、
#                广告拦截及特定网站/应用分流等功能。
# ================================================================================

# ============================== 代理配置 ==============================
# 订阅通用配置
provider-config: &provider-config
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    lazy: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    # smux 多路复用，提升多路复用效率，减少握手；部分机场不支持，如连接失败请注释本段
    smux:
      enabled: true
      padding: true
      protocol: h2mux

use: &use
  use:
    - provider1
    - provider2
  skip-cert-verify: true
  include-all: true

# 自建节点
proxies:
  # 示例节点 hysteria2
  # - name: "xxx hysteria2"
  #   type: hysteria2
  #   server: xxx.com
  #   port: 10721
  #   # ports: 10721-20721
  #   #  up 和 down 均不写或为 0 则使用 BBR 流控
  #   up: "1 Gbps" # 若不写单位，默认为 Mbps
  #   down: "1 Gbps" # 若不写单位，默认为 Mbps
  #   password: xxxxxxxx

  # 示例节点 vless-reality-vision
  # - name: "xxx vless-reality-vision"
  #   type: vless
  #   server: xxx.com
  #   port: 30721
  #   uuid: xxxxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  #   network: tcp
  #   tls: true
  #   udp: true
  #   flow: xtls-rprx-vision
  #   servername: xxx.com
  #   reality-opts:
  #     public-key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  #     short-id: xxxxxxxx
  #   client-fingerprint: chrome

  # MajsoulMax 本地节点，如部署到 VPS 上则替换为服务器地址
  - name: MajsoulMax
    type: http
    server: 127.0.0.1
    port: 23410
    tls: true

# 订阅
proxy-providers:
  provider1:
    url: ""
    path: ./proxy_provider/provider1.yaml
    <<: *provider-config
    override:
      additional-prefix: "[] "

  provider2:
    url: ""
    path: ./proxy_provider/provider2.yaml
    <<: *provider-config
    override:
      additional-prefix: "[] "


# =============================== 基础配置 ===============================
# port: 7890 # HTTP(S) 代理服务器端口
# socks-port: 7891 # SOCKS5 代理端口
mixed-port: 10801 # HTTP(S) 和 SOCKS 代理混合端口
# redir-port: 7892 # 透明代理端口，用于 Linux 和 MacOS

# Transparent proxy server port for Linux (TProxy TCP and TProxy UDP)
# tproxy-port: 7893

allow-lan: true # 允许局域网连接
bind-address: "*" # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址
# authentication: # http,socks 入口的验证用户名，密码
#   - "username:password"
# skip-auth-prefixes: # 设置跳过验证的 IP 段
#   - 127.0.0.1/8
#   - ::1/128
# lan-allowed-ips: # 允许连接的 IP 地址段，仅作用于 allow-lan 为 true, 默认值为 0.0.0.0/0 和::/0
#   - 0.0.0.0/0
#   - ::/0
# lan-disallowed-ips: # 禁止连接的 IP 地址段，黑名单优先级高于白名单，默认值为空
#   - 192.168.0.3/32

#  find-process-mode has 3 values:always, strict, off
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

mode: rule

#自定义 geodata url
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

geodata-mode: true # 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true为 dat，此项有默认值 false
geodata-loader: memconservative # GEO 文件加载模式，可选 standard/memconservative,standard为标准加载器，memconservative专为内存受限 (小内存) 设备优化的加载器 (默认值)

geo-auto-update: false # 是否自动更新 geodata
geo-update-interval: 24 # 更新间隔，单位：小时

# Matcher implementation used by GeoSite, available implementations:
# - succinct (default, same as rule-set)
# - mph (from V2Ray, also `hybrid` in Xray)
# geosite-matcher: succinct

log-level: debug # 日志等级 silent/error/warning/info/debug

ipv6: true # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录

external-controller: 127.0.0.1:9093 # RESTful API 监听地址
# external-controller-tls: 0.0.0.0:9443 # RESTful API HTTPS 监听地址，需要配置 tls 部分配置文件
# secret: "123456" # `Authorization:Bearer ${secret}`

unified-delay: true # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
tcp-concurrent: true # 启用 TCP 并发连接，将会使用 dns 解析出的所有 IP 地址进行连接，使用第一个成功的连接


# 配置 WEB UI 目录，使用 http://{{external-controller}}/ui 访问
external-ui: "./ui"
external-ui-name: zashboard
# 目前支持下载zip,tgz格式的压缩包
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

# 在RESTful API端口上开启DOH服务器
# ！！！该URL不会验证secret， 如果开启请自行保证安全问题 ！！！
# external-doh-server: /dns-query

# interface-name: en0 # 设置出口网卡

# 全局 TLS 指纹，优先低于 proxy 内的 client-fingerprint
# 可选： "chrome","firefox","safari","ios","random","none" options.
# Utls is currently support TLS transport in TCP/grpc/WS/HTTP for VLESS/Vmess and trojan.
global-client-fingerprint: chrome

#  TCP keep alive interval
disable-keep-alive: false #目前在android端强制为true
keep-alive-idle: 600
keep-alive-interval: 15

profile: # 存储 select 选择记录
  store-selected: true

  # 持久化 fake-ip
  store-fake-ip: true

# Tun 配置
tun:
  enable: true
  stack: mixed # system/gvisor/mixed
  dns-hijack:
    # - 0.0.0.0:53 # 需要劫持的 DNS
    - any:53
    # - tcp://any:53 # 注释掉用于安卓优化
  auto-detect-interface: true # 自动识别出口网卡
  auto-route: true # 配置路由表
  mtu: 1500 # 最大传输单元
  gso: true # 启用通用分段卸载，仅支持 Linux
  gso-max-size: 65536 # 通用分段卸载包的最大大小
  auto-redirect: true # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  strict-route: true # 将所有连接路由到 tun 来防止泄漏，但你的设备将无法其他设备被访问
  udp-timeout: 300 # UDP NAT 过期时间

# 嗅探域名 可选配置
sniffer:
  enable: true
  ## 对 redir-host 类型识别的流量进行强制嗅探
  ## 如：Tun、Redir 和 TProxy 并 DNS 为 redir-host 皆属于
  # force-dns-mapping: false
  ## 对所有未获取到域名的流量进行强制嗅探
  # parse-pure-ip: false
  # 是否使用嗅探结果作为实际访问，默认 true
  # 全局配置，优先级低于 sniffer.sniff 实际配置
  override-destination: false
  sniff: # TLS 和 QUIC 默认如果不配置 ports 默认嗅探 443
    # QUIC:
    #   ports: [ 443 ]
    TLS:
      ports: [443, 8443]

    # 默认嗅探 80
    HTTP: # 需要嗅探的端口
      ports: [80, 8080-8880]
      # 可覆盖 sniffer.override-destination
      override-destination: true
  force-domain:
    - +.v2ex.com
  # skip-src-address: # 对于来源ip跳过嗅探
  #   - 192.168.0.3/32
  # skip-dst-address: # 对于目标ip跳过嗅探
  #   - 192.168.0.3/32
  ## 对嗅探结果进行跳过
  skip-domain:
    # - Mijia Cloud
    - "+.baidu.com"
    - "+.bilibili.com"

# DNS 配置
dns:
  cache-algorithm: arc
  enable: true # 关闭将使用系统 DNS
  prefer-h3: false # 是否开启 DoH 支持 HTTP/3，将并发尝试
  listen: 0.0.0.0:53 # 开启 DNS 服务器监听
  ipv6: true # false 将返回 AAAA 的空结果
  # ipv6-timeout: 300 # 单位：ms，内部双栈并发时，向上游查询 AAAA 时，等待 AAAA 的时间，默认 100ms
  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - 1.1.1.1                    # Cloudflare Public DNS (UDP)
    - 8.8.8.8                    # Google Public DNS (UDP)
  enhanced-mode: fake-ip # or redir-host

  fake-ip-range: 198.18.0.1/16 # fake-ip 池设置
  # fake-ip-range6: fdfe:dcba:9876::1/64 # fake-ip6 池设置

  # 配置不使用 fake-ip 的域名
  fake-ip-filter:
    - rule-set:private_domain
    - rule-set:cn_domain
    - geosite:connectivity-check
    - geosite:private
    - rule-set:fake_ip_filter_DustinWin
  # 配置fake-ip-filter的匹配模式，默认为blacklist，即如果匹配成功不返回fake-ip
  # 可设置为whitelist，即只有匹配成功才返回fake-ip
  fake-ip-filter-mode: blacklist

  use-hosts: false # 查询 hosts
  use-system-hosts: false # 使用系统 hosts

  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  respect-rules: true

  # DNS 主要域名配置
  # 支持 UDP，TCP，DoT，DoH，DoQ
  # 这部分为主要 DNS 配置，影响所有直连，确保使用对大陆解析精准的 DNS
  nameserver: # 默认 DNS，供所有请求使用，支持 DoH3 的在前面
    - https://1.1.1.1/dns-query    # Cloudflare（支持 H3）
    - https://dns.google/dns-query # Google（支持 H3）
    - 1.1.1.1                      # Cloudflare Public DNS
    - 8.8.8.8                      # Google Public DNS

  # 当配置 fallback 时，会查询 nameserver 中返回的 IP 是否为 CN，非必要配置
  # 当不是 CN，则使用 fallback 中的 DNS 查询结果
  # 确保配置 fallback 时能够正常查询
  fallback:
    - 1.1.1.1
    - 8.8.8.8

  # 专用于节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
  proxy-server-nameserver:          # 当请求通过代理（即国外站）时使用
    - https://1.1.1.1/dns-query     # Cloudflare，DoH3
    - https://dns.google/dns-query  # Google，DoH3
    - 1.1.1.1
    - 8.8.8.8

  # 配置查询域名使用的 DNS 服务器
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
      - 223.5.5.5
      - 119.29.29.29
    "geosite:gfw,geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
      - 1.1.1.1
      - 8.8.8.8


# **=============================== 代理组设置 ===============================**
select-group: &select-group
  type: select
  proxies:
    - ♻️ 自动选择
    - 🌐 全部节点
    - ⚡️ 低倍节点
    - 🏠 家宽节点
    - 🛠️ 自建节点
    - 🛡️ 故障转移
    - 🇭🇰 香港节点
    - 🇹🇼 台湾节点
    - 🇯🇵 日本节点
    - 🇸🇬 新加坡节点
    - 🇺🇸 美国节点
    - 🇬🇧 英国节点
    - 🌍 其他节点

# 🎯 节点筛选规则
hk-filter: &hk-filter '^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
tw-filter: &tw-filter '^(?=.*((?i)🇹🇼|🇨🇳|台湾|(\b(TW|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
jp-filter: &jp-filter '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
sg-filter: &sg-filter '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
us-filter: &us-filter '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
uk-filter: &uk-filter '^(?=.*((?i)🇬🇧|英国|英|(\b(UK|United Kingdom)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
mo-filter: &mo-filter '^(?=.*((?i)🇲🇴|澳门|(\b(MO|Macao)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
kr-filter: &kr-filter '^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
ru-filter: &ru-filter '^(?=.*((?i)🇷🇺|俄罗斯|俄|(\b(RU|Russia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
tr-filter: &tr-filter '^(?=.*((?i)🇹🇷|土耳其|(\b(TR|Turkey)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
all-nodes: &all-nodes '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|MajsoulMax)).*$'
other-nodes: &other-nodes '^(?=.*(.))(?!.*((?i)(?:🇭🇰|香港|HK|Hong|🇹🇼|台湾|TW|Tai|🇯🇵|日本|川日|东京|大阪|泉日|埼玉|JP|Japan|🇸🇬|新加坡|狮|SG|Singapore|🇺🇸|美国|US|United States|🇬🇧|英国|UK|United Kingdom|🇲🇴|澳门|MO|Macao|🇰🇷|韩国|KR|Korea|🇷🇺|俄罗斯|RU|Russia|🇹🇷|土耳其|TR|Turkey|回国|校园|游戏|🎮|\bGAME\b|MajsoulMax))).*$'
residential-nodes: &residential-nodes '^(?=.*((?i)家宽|(\b(HOME|Family)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
lowrate-nodes: &lowrate-nodes '(?i)(0\.[0-9]+)'

# 🧪 分组模板: 自动选择 / 故障转移
UrlTest: &UrlTest { type: url-test, <<: *use, tolerance: 20, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, interval: 6, hidden: true }
FallBack: &FallBack { type: fallback, <<: *use, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, interval: 6, hidden: true }

# 代理组
proxy-groups:
  - { name: PROXY, type: select, <<: *select-group }

  # ♻️ 节点自动选择
  - { name: AUTO, <<: *UrlTest }
  - { name: 🇭🇰 香港自动选择, <<: *UrlTest, filter: *hk-filter }
  - { name: 🇹🇼 台湾自动选择, <<: *UrlTest, filter: *tw-filter }
  - { name: 🇯🇵 日本自动选择, <<: *UrlTest, filter: *jp-filter }
  - { name: 🇸🇬 新加坡自动选择, <<: *UrlTest, filter: *sg-filter }
  - { name: 🇺🇸 美国自动选择, <<: *UrlTest, filter: *us-filter }
  - { name: 🇬🇧 英国自动选择, <<: *UrlTest, filter: *uk-filter }
  - { name: 🇲🇴 澳门自动选择, <<: *UrlTest, filter: *mo-filter }
  - { name: 🇰🇷 韩国自动选择, <<: *UrlTest, filter: *kr-filter }
  - { name: 🇷🇺 俄罗斯自动选择, <<: *UrlTest, filter: *ru-filter }
  - { name: 🇹🇷 土耳其自动选择, <<: *UrlTest, filter: *tr-filter }

  # 🔀 主要分组
  - { name: ♻️ 自动选择, type: select, proxies: [AUTO, 🇭🇰 香港自动选择, 🇹🇼 台湾自动选择, 🇯🇵 日本自动选择, 🇸🇬 新加坡自动选择, 🇺🇸 美国自动选择, 🇬🇧 英国自动选择] }
  - { name: 🌐 全部节点, type: select, <<: *use, filter: *all-nodes }
  - { name: 🏠 家宽节点, type: select, <<: *use, filter: *residential-nodes }
  - { name: ⚡️ 低倍节点, type: select, <<: *use, filter: *lowrate-nodes }
  - { name: 🛠️ 自建节点, type: select, filter: *all-nodes, include-all-proxies: true }
  - { name: 🛡️ 故障转移, <<: *FallBack, proxies: [🇭🇰 香港自动选择, 🇹🇼 台湾自动选择, 🇯🇵 日本自动选择, 🇸🇬 新加坡自动选择, 🇺🇸 美国自动选择, 🇬🇧 英国自动选择] }

  # 🌍 节点手动选择
  - { name: 🇭🇰 香港节点, type: select, <<: *use, filter: *hk-filter }
  - { name: 🇹🇼 台湾节点, type: select, <<: *use, filter: *tw-filter }
  - { name: 🇯🇵 日本节点, type: select, <<: *use, filter: *jp-filter }
  - { name: 🇸🇬 新加坡节点, type: select, <<: *use, filter: *sg-filter }
  - { name: 🇺🇸 美国节点, type: select, <<: *use, filter: *us-filter }
  - { name: 🇬🇧 英国节点, type: select, <<: *use, filter: *uk-filter }
  - { name: 🌍 其他节点, type: select, <<: *use, filter: *other-nodes }

  #  其他规则组
  - { name: AI, type: select, proxies: [🇺🇸 美国自动选择, 🇸🇬 新加坡自动选择, 🇺🇸 美国节点, 🇸🇬 新加坡节点, PROXY] }
  - { name: Microsoft, type: select, proxies: [DIRECT, PROXY, 🇭🇰 香港自动选择, 🇺🇸 美国自动选择] }
  - { name: Telegram, type: select, proxies: [PROXY, 🇭🇰 香港自动选择, 🇺🇸 美国自动选择, 🇬🇧 英国自动选择] }
